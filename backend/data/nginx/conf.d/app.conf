server {
    listen 80;
    server_name phamducthanh-dev.com;

    # Endpoint để Let's Encrypt xác thực
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect mọi request HTTP sang HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name phamducthanh-dev.com;

    # Đường dẫn chứng chỉ (Certbot sẽ tạo ra sau khi chạy lệnh cấp phát)
    ssl_certificate /etc/letsencrypt/live/phamducthanh-dev.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/phamducthanh-dev.com/privkey.pem;

    # Tối ưu SSL
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/ {
        proxy_pass http://backend:8080/;
        proxy_set_header Host $host;
    }
}